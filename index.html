<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Happy Birthday ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    overflow-x:hidden;
    min-height:100vh;
    font-family:'Poppins',sans-serif;
    background:linear-gradient(135deg,#ff4e8a,#ff9eb5,#ffd6df);
    display:flex;
    justify-content:center;
    align-items:center;
    position:relative;
    padding:20px;
}

/* Floating Hearts */

.heart{
    position:absolute;
    width:15px;
    height:15px;
    background:#ff0055;
    transform:rotate(45deg);
    animation:float 8s linear infinite;
    opacity:.7;
}

.heart::before,
.heart::after{
    content:'';
    position:absolute;
    width:15px;
    height:15px;
    background:#ff0055;
    border-radius:50%;
}

.heart::before{
    top:-7px;
    left:0;
}

.heart::after{
    left:-7px;
    top:0;
}

@keyframes float{

    0%{
        transform:translateY(100vh) rotate(45deg);
        opacity:0;
    }

    100%{
        transform:translateY(-120vh) rotate(45deg);
        opacity:1;
    }
}

/* Roses */

.rose{
    position:absolute;
    font-size:25px;
    animation:roseFall linear infinite;
    z-index:1;
}

@keyframes roseFall{

    0%{
        transform:translateY(-10vh) rotate(0deg);
        opacity:0;
    }

    10%{
        opacity:1;
    }

    100%{
        transform:translateY(110vh) rotate(360deg);
        opacity:.8;
    }
}

/* Sparkles */

.sparkle{
    position:absolute;
    width:5px;
    height:5px;
    background:white;
    border-radius:50%;
    animation:sparkle 3s linear infinite;
}

@keyframes sparkle{

    0%{
        transform:scale(0);
        opacity:0;
    }

    50%{
        transform:scale(1);
        opacity:1;
    }

    100%{
        transform:scale(0);
        opacity:0;
    }
}

/* Main Box */

.card{
    position:relative;
    z-index:10;
    width:100%;
    max-width:900px;
    text-align:center;
    animation:cardFloat 4s ease-in-out infinite;
}

@keyframes cardFloat{

    0%{
        transform:translateY(0px);
    }

    50%{
        transform:translateY(-10px);
    }

    100%{
        transform:translateY(0px);
    }
}

/* Title */

.title{
    color:white;
    font-size:3rem;
    margin-bottom:20px;
    text-shadow:0 0 15px white;
}

.text{
    color:white;
    font-size:1.2rem;
    margin-bottom:35px;
}

/* Buttons */

.btn,
.memory-btn{
    padding:18px 45px;
    border:none;
    border-radius:100px;

    background:linear-gradient(135deg,#ff0066,#ff4da6);

    color:white;
    font-size:1.1rem;
    font-weight:700;

    cursor:pointer;

    transition:.4s;

    box-shadow:
    0 0 20px rgba(255,0,102,.5),
    0 0 40px rgba(255,0,102,.4);
}

.btn:hover,
.memory-btn:hover{

    transform:scale(1.08) translateY(-5px);

    box-shadow:
    0 0 30px rgba(255,0,102,.8),
    0 0 60px rgba(255,0,102,.7);
}

/* Question */

.question{
    color:white;
    font-size:2rem;
    margin-bottom:30px;
}

/* Choice Buttons */

.choice-buttons{
    display:flex;
    justify-content:center;
    gap:25px;
    flex-wrap:wrap;
}

.choice{
    padding:15px 35px;
    border:none;
    border-radius:60px;
    font-size:1.1rem;
    font-weight:700;
    color:white;
    cursor:pointer;
    transition:.4s;
}

.yes{
    background:#ff0066;
}

.no{
    background:#222;
}

.choice:hover{
    transform:scale(1.08);
}

/* Final Content */

.final-content{
    color:white;
    animation:fadeIn 1s ease;
}

.main-gif{
    width:250px;
    max-width:90%;
    border-radius:20px;
    margin-bottom:20px;
    box-shadow:0 0 25px rgba(255,255,255,.5);
}

.shayri{
    margin-top:20px;
    font-size:1.1rem;
    line-height:2;
}

.love{
    margin-top:25px;
    margin-bottom:25px;
    font-size:2rem;
    font-weight:700;
    animation:pulse 1.5s infinite;
}

@keyframes pulse{

    0%{
        transform:scale(1);
    }

    50%{
        transform:scale(1.08);
    }

    100%{
        transform:scale(1);
    }
}

@keyframes fadeIn{

    from{
        opacity:0;
        transform:translateY(20px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }
}

/* Slider */

.slider-wrapper{
    margin-top:40px;
}

.slider{
    position:relative;
    width:100%;
    height:350px;
    overflow:hidden;
    border-radius:25px;
}

.slide{
    position:absolute;
    width:100%;
    height:100%;
    opacity:0;
    transition:1s;
    transform:scale(.9);
}

.slide.active{
    opacity:1;
    transform:scale(1);
}

.slide img{
    width:100%;
    height:100%;
    object-fit:cover;
    border-radius:25px;
}

/* Mini Hearts */

.mini-heart{
    position:absolute;
    font-size:20px;
    animation:miniFloat 4s linear infinite;
}

@keyframes miniFloat{

    0%{
        transform:translateY(0) scale(0);
        opacity:0;
    }

    50%{
        opacity:1;
    }

    100%{
        transform:translateY(-120px) scale(1.5);
        opacity:0;
    }
}

/* Mobile */

@media(max-width:768px){

    .title{
        font-size:2rem;
    }

    .question{
        font-size:1.5rem;
    }

    .love{
        font-size:1.5rem;
    }

    .shayri{
        font-size:1rem;
    }

    .slider{
        height:250px;
    }

    .btn,
    .memory-btn{
        padding:15px 30px;
        font-size:1rem;
    }
}

</style>

</head>

<body>

<div class="card" id="mainCard">

    <h1 class="title">
        🎂 Happy Birthday Lolu ❤️
    </h1>

    <p class="text">
        I have a beautiful surprise for you 💕
    </p>

    <button class="btn" id="surpriseBtn">
        ✨ Open Surprise ✨
    </button>

</div>

<script>

/* Floating Hearts */

for(let i=0;i<35;i++){

    let heart=document.createElement("div");

    heart.classList.add("heart");

    heart.style.left=Math.random()*100+"vw";

    heart.style.animationDuration=
    (4+Math.random()*5)+"s";

    document.body.appendChild(heart);
}

/* Roses */

for(let i=0;i<20;i++){

    let rose=document.createElement("div");

    rose.classList.add("rose");

    rose.innerHTML="🌹";

    rose.style.left=Math.random()*100+"vw";

    rose.style.animationDuration=
    (5+Math.random()*5)+"s";

    rose.style.fontSize=
    (20+Math.random()*15)+"px";

    document.body.appendChild(rose);
}

/* Sparkles */

for(let i=0;i<30;i++){

    let sparkle=document.createElement("div");

    sparkle.classList.add("sparkle");

    sparkle.style.left=Math.random()*100+"vw";

    sparkle.style.top=Math.random()*100+"vh";

    sparkle.style.animationDuration=
    (2+Math.random()*3)+"s";

    document.body.appendChild(sparkle);
}

/* Surprise Button */

document.getElementById("surpriseBtn").onclick=function(){

    document.getElementById("mainCard").innerHTML=`

        <div class="question">
            Do You Really Love Me? ❤️
        </div>

        <div class="choice-buttons">

            <button class="choice yes"
            onclick="showLove()">

                Yes 💖

            </button>

            <button class="choice no"
            onclick="showSad()">

                No 💔

            </button>

        </div>

    `;
}

/* YES */

function showLove(){

    document.getElementById("mainCard").innerHTML=`

        <div class="final-content">

            <img class="main-gif"
            src="https://media.giphy.com/media/MDJ9IbxxvDUQM/giphy.gif">

            <h1 style="margin-bottom:20px;">
                🌸 Wife 🌸
            </h1>

            <div class="shayri">

                Teri hasi ka asar kuch aisa chhaya hai,<br>

                Har din mera bas tere naam se sajaya hai.<br>

                Tu paas ho toh har gham bhi halka lagta hai,<br>

                Meri zindagi ka sabse khoobsurat hissa
                tu hi banaya hai ❤️

            </div>

            <div class="love">
                I Love You Wife ❤️
            </div>

            <button class="memory-btn"
            onclick="showMemories()">

                💕 Our Lovable Memories 💕

            </button>

            <div id="memorySlider"
            style="display:none;">

                <div class="slider-wrapper">

                    <div class="slider">

                        <div class="slide active">
                            <img src="https://picsum.photos/id/1011/1200/800">
                        </div>

                        <div class="slide">
                            <img src="https://i.ibb.co/KjLrv8xf/Screenshot-2026-05-22-22-16-07-02-f9ee0578fe1cc94de7482bd41accb329.jpg">
                        </div>

                        <div class="slide">
                            <img src="https://picsum.photos/id/1035/1200/800">
                        </div>

                        <div class="slide">
                            <img src="https://picsum.photos/id/1040/1200/800">
                        </div>

                        <div class="slide">
                            <img src="https://picsum.photos/id/1050/1200/800">
                        </div>

                        <div class="slide">
                            <img src="https://picsum.photos/id/1062/1200/800">
                        </div>

                        <div class="slide">
                            <img src="https://picsum.photos/id/1074/1200/800">
                        </div>

                        <div class="slide">
                            <img src="https://picsum.photos/id/1084/1200/800">
                        </div>

                        <div class="slide">
                            <img src="https://picsum.photos/id/1080/1200/800">
                        </div>

                        <div class="slide">
                            <img src="https://picsum.photos/id/1005/1200/800">
                        </div>

                    </div>

                </div>

            </div>

        </div>

    `;
}

/* Show Slider */

function showMemories(){

    document.getElementById("memorySlider")
    .style.display="block";

    document.querySelector(".memory-btn")
    .style.display="none";

    startSlider();

    floatingMiniHearts();
}

/* Slider */

function startSlider(){

    const slides=document.querySelectorAll('.slide');

    let index=0;

    setInterval(()=>{

        slides[index].classList.remove('active');

        index=(index+1)%slides.length;

        slides[index].classList.add('active');

    },3000);
}

/* Mini Hearts */

function floatingMiniHearts(){

    const slider=document.querySelector('.slider');

    setInterval(()=>{

        let heart=document.createElement("div");

        heart.classList.add("mini-heart");

        heart.innerHTML="❤️";

        heart.style.left=Math.random()*100+"%";

        heart.style.bottom="20px";

        slider.appendChild(heart);

        setTimeout(()=>{
            heart.remove();
        },4000);

    },500);
}

/* NO */

function showSad(){

    document.getElementById("mainCard").innerHTML=`

        <div class="final-content">

            <img class="main-gif"
            src="https://media.giphy.com/media/OPU6wzx8JrHna/giphy.gif">

            <div class="love">
                💔 You Broke My Heart 💔
            </div>

            <div class="shayri">
                But I will always love you forever ❤️
            </div>

        </div>

    `;
}

</script>

</body>
</html>
