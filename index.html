<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Happy Birthday ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    overflow-x:hidden;
    min-height:100vh;
    font-family:'Poppins',sans-serif;
    background:linear-gradient(135deg,#ff4e8a,#ff9eb5,#ffd6df);
    display:flex;
    justify-content:center;
    align-items:center;
    position:relative;
    padding:20px;
}

/* Floating Hearts */

.heart{
    position:absolute;
    width:15px;
    height:15px;
    background:#ff0055;
    transform:rotate(45deg);
    animation:float 8s linear infinite;
    opacity:.7;
}

.heart::before,
.heart::after{
    content:'';
    position:absolute;
    width:15px;
    height:15px;
    background:#ff0055;
    border-radius:50%;
}

.heart::before{
    top:-7px;
    left:0;
}

.heart::after{
    left:-7px;
    top:0;
}

@keyframes float{

    0%{
        transform:translateY(100vh) rotate(45deg);
        opacity:0;
    }

    100%{
        transform:translateY(-120vh) rotate(45deg);
        opacity:1;
    }
}

/* Roses */

.rose{
    position:absolute;
    font-size:25px;
    animation:roseFall linear infinite;
    z-index:1;
}

@keyframes roseFall{

    0%{
        transform:translateY(-10vh) rotate(0deg);
        opacity:0;
    }

    10%{
        opacity:1;
    }

    100%{
        transform:translateY(110vh) rotate(360deg);
        opacity:.8;
    }
}

/* Sparkles */

.sparkle{
    position:absolute;
    width:5px;
    height:5px;
    background:white;
    border-radius:50%;
    animation:sparkle 3s linear infinite;
}

@keyframes sparkle{

    0%{
        transform:scale(0);
        opacity:0;
    }

    50%{
        transform:scale(1);
        opacity:1;
    }

    100%{
        transform:scale(0);
        opacity:0;
    }
}

/* Main Box */

.card{
    position:relative;
    z-index:10;
    width:100%;
    max-width:900px;
    text-align:center;
    animation:cardFloat 4s ease-in-out infinite;
}

@keyframes cardFloat{

    0%{
        transform:translateY(0px);
    }

    50%{
        transform:translateY(-10px);
    }

    100%{
        transform:translateY(0px);
    }
}

/* Title */

.title{
    color:white;
    font-size:3rem;
    margin-bottom:20px;
    text-shadow:0 0 15px white;
}

.text{
    color:white;
    font-size:1.2rem;
    margin-bottom:35px;
}

/* Buttons */

.btn,
.memory-btn,
.again-yes{
    padding:18px 45px;
    border:none;
    border-radius:100px;

    background:linear-gradient(135deg,#ff0066,#ff4da6);

    color:white;
    font-size:1.1rem;
    font-weight:700;

    cursor:pointer;

    transition:.4s;

    box-shadow:
    0 0 20px rgba(255,0,102,.5),
    0 0 40px rgba(255,0,102,.4);
}

.btn:hover,
.memory-btn:hover,
.again-yes:hover{

    transform:scale(1.08) translateY(-5px);

    box-shadow:
    0 0 30px rgba(255,0,102,.8),
    0 0 60px rgba(255,0,102,.7);
}

/* Question */

.question{
    color:white;
    font-size:2rem;
    margin-bottom:30px;
}

/* Choice Buttons */

.choice-buttons{
    display:flex;
    justify-content:center;
    gap:25px;
    flex-wrap:wrap;
}

.choice{
    padding:15px 35px;
    border:none;
    border-radius:60px;
    font-size:1.1rem;
    font-weight:700;
    color:white;
    cursor:pointer;
    transition:.4s;
}

.yes{
    background:#ff0066;
}

.no{
    background:#222;
}

.choice:hover{
    transform:scale(1.08);
}

/* Final Content */

.final-content{
    color:white;
    animation:fadeIn 1s ease;
}

.main-gif{
    width:250px;
    max-width:90%;
    border-radius:20px;
    margin-bottom:20px;
    box-shadow:0 0 25px rgba(255,255,255,.5);
}

.shayri{
    margin-top:20px;
    font-size:1.1rem;
    line-height:2;
}

.love{
    margin-top:25px;
    margin-bottom:25px;
    font-size:2rem;
    font-weight:700;
    animation:pulse 1.5s infinite;
}

.sad-emoji{
    font-size:120px;
    margin-bottom:20px;
    animation:pulse 2s infinite;
}

@keyframes pulse{

    0%{
        transform:scale(1);
    }

    50%{
        transform:scale(1.08);
    }

    100%{
        transform:scale(1);
    }
}

@keyframes fadeIn{

    from{
        opacity:0;
        transform:translateY(20px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }
}

/* Slider */

.slider-wrapper{
    margin-top:40px;
}

.slider{
    position:relative;
    width:100%;
    height:350px;
    overflow:hidden;
    border-radius:25px;
}

.slide{
    position:absolute;
    width:100%;
    height:100%;
    opacity:0;
    transition:1s;
    transform:scale(.9);
}

.slide.active{
    opacity:1;
    transform:scale(1);
}

.slide img{
    width:100%;
    height:100%;
    object-fit:cover;
    border-radius:25px;
}

/* Mini Hearts */

.mini-heart{
    position:absolute;
    font-size:20px;
    animation:miniFloat 4s linear infinite;
}

@keyframes miniFloat{

    0%{
        transform:translateY(0) scale(0);
        opacity:0;
    }

    50%{
        opacity:1;
    }

    100%{
        transform:translateY(-120px) scale(1.5);
        opacity:0;
    }
}

/* Mobile */

@media(max-width:768px){

    .title{
        font-size:2rem;
    }

    .question{
        font-size:1.5rem;
    }

    .love{
        font-size:1.5rem;
    }

    .shayri{
        font-size:1rem;
    }

    .slider{
        height:250px;
    }

    .btn,
    .memory-btn,
    .again-yes{
        padding:15px 30px;
        font-size:1rem;
    }

    .sad-emoji{
        font-size:90px;
    }
}
#startScreen{
    position:fixed;
    inset:0;
    background:linear-gradient(135deg,#ff4e8a,#ff9eb5);
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:9999;
}

#startBtn{
    padding:20px 45px;
    border:none;
    border-radius:100px;
    font-size:1.2rem;
    font-weight:700;
    color:white;
    cursor:pointer;
    background:linear-gradient(135deg,#ff0066,#ff4da6);
}

#videoScreen{
    position:fixed;
    inset:0;
    background:black;
    z-index:9998;
}

#introVideo{
    width:100%;
    height:100vh;
    object-fit:cover;
}
    .btn{

    opacity:0;

    transform:translateY(120px);

    transition:
    opacity 1s ease,
    transform 1s ease;
}
.btn{
    opacity:0;
    transform:translateY(120px);
    transition:1s ease;
}

.show-btn{
    opacity:1;
    transform:translateY(0);
}
.show-btn{

    opacity:1;

    transform:translateY(0);
}
</style>

</head>

<body>
    <div id="startScreen">

    <button id="startBtn">
        ❤️ Tap To Start ❤️
    </button>

</div>

<div id="videoScreen" style="display:none;">

    <video id="video1" playsinline preload="auto" style="width:100%;height:100vh;object-fit:cover;">
        <source src="video1.mp4" type="video/mp4">
    </video>

    <video id="video2" playsinline preload="auto" style="width:100%;height:100vh;object-fit:cover;display:none;">
        <source src="video2.mp4" type="video/mp4">
    </video>

</div>

<div id="mainContent" style="display:none;">

    

<div class="card" id="mainCard">

    <h1 class="title">
        🎂 Happy Birthday Lolu ❤️
    </h1>

    <p class="text">
        I have a beautiful surprise for you 💕
    </p>

    <button class="btn" id="surpriseBtn">
        ✨ Open Surprise ✨
    </button>

</div>
</div>
<script>

/* Floating Hearts */

for(let i=0;i<35;i++){

    let heart=document.createElement("div");

    heart.classList.add("heart");

    heart.style.left=Math.random()*100+"vw";

    heart.style.animationDuration=
    (4+Math.random()*5)+"s";

    document.body.appendChild(heart);
}

/* Roses */

for(let i=0;i<20;i++){

    let rose=document.createElement("div");

    rose.classList.add("rose");

    rose.innerHTML="🌹";

    rose.style.left=Math.random()*100+"vw";

    rose.style.animationDuration=
    (5+Math.random()*5)+"s";

    rose.style.fontSize=
    (20+Math.random()*15)+"px";

    document.body.appendChild(rose);
}

/* Sparkles */

for(let i=0;i<30;i++){

    let sparkle=document.createElement("div");

    sparkle.classList.add("sparkle");

    sparkle.style.left=Math.random()*100+"vw";

    sparkle.style.top=Math.random()*100+"vh";

    sparkle.style.animationDuration=
    (2+Math.random()*3)+"s";

    document.body.appendChild(sparkle);
}

/* Surprise Button */

document.getElementById("surpriseBtn").onclick=function(){

    document.getElementById("mainCard").innerHTML=`


<img class="main-gif" src="https://media.tenor.com/DTMqYt1uK7EAAAAM/eandl.gif">

        <div class="question">
            Do You Really Love Me? ❤️
        </div>

        <div class="choice-buttons">

            <button class="choice yes"
            onclick="showLove()">

                Yes 💖

            </button>

            <button class="choice no"
            onclick="showSad()">

                No 💔

            </button>

        </div>

    `;
}

/* YES */

function showLove(){

    document.getElementById("mainCard").innerHTML=`

        <div class="final-content">

            <img class="main-gif"
            src="https://media.giphy.com/media/MDJ9IbxxvDUQM/giphy.gif">

            <h1 style="margin-bottom:20px;">
                🌸 My Beautiful Wife 🌸
            </h1>

            <div class="shayri">

                Teri hasi meri duniya ka sabse pyara ehsaas hai ❤️<br>

                Tera saath meri zindagi ki sabse khoobsurat baat hai ✨<br>

                Har dua mein sirf tera naam maanga hai maine 💕<br>

                Aur har janam mein sirf tujhe hi chaha hai ❤️

            </div>

            <div class="love">
                I Love You Forever ❤️
            </div>

            <button class="memory-btn"
            onclick="showMemories()">

                💕 Our Lovable Memories 💕

            </button>

            <div id="memorySlider"
            style="display:none;">

                <div class="slider-wrapper">

                    <div class="slider">

                        <div class="slide active">
                            <img src="https://picsum.photos/id/1011/1200/800">
                        </div>

                        <div class="slide">
                            <img src="https://picsum.photos/id/1025/1200/800">
                        </div>

                        <div class="slide">
                            <img src="https://picsum.photos/id/1035/1200/800">
                        </div>

                        <div class="slide">
                            <img src="https://picsum.photos/id/1040/1200/800">
                        </div>

                        <div class="slide">
                            <img src="https://picsum.photos/id/1050/1200/800">
                        </div>

                    </div>

                </div>

            </div>

        </div>

    `;
}

/* Show Slider */

function showMemories(){

    document.getElementById("memorySlider")
    .style.display="block";

    document.querySelector(".memory-btn")
    .style.display="none";

    startSlider();

    floatingMiniHearts();
}

/* Slider */

function startSlider(){

    const slides=document.querySelectorAll('.slide');

    let index=0;

    setInterval(()=>{

        slides[index].classList.remove('active');

        index=(index+1)%slides.length;

        slides[index].classList.add('active');

    },3000);
}

/* Mini Hearts */

function floatingMiniHearts(){

    const slider=document.querySelector('.slider');

    setInterval(()=>{

        let heart=document.createElement("div");

        heart.classList.add("mini-heart");

        heart.innerHTML="❤️";

        heart.style.left=Math.random()*100+"%";

        heart.style.bottom="20px";

        slider.appendChild(heart);

        setTimeout(()=>{
            heart.remove();
        },4000);

    },500);
}

/* NO */

function showSad(){

    document.getElementById("mainCard").innerHTML=`

        <div class="final-content">

            <div class="sad-emoji">
                <img class="main-gif"
            src="https://media.tenor.com/7zfJK1SOYxoAAAAM/milk-and-mocha.gif">
            </div>

            <div class="love">
                It's Okay My Love ❤️
            </div>

            <div class="shayri">

                Shayad tumhe abhi ehsaas nahi hai ❤️<br>

                Par mera dil sirf tumhare liye dhadakta hai 💕<br>

                Aur waise bhi... tumhare paas ek hi option hai 😌✨<br><br>

                Bas "Yes" bolo aur mujhe duniya ka
                sabse khush insaan bana do ❤️

            </div>

            <br><br>

            <button class="again-yes"
            onclick="showLove()">

                💖 Okay Fine... Yes 💖

            </button>

        </div>

    `;
}
const startBtn = document.getElementById("startBtn");
const startScreen = document.getElementById("startScreen");
const videoScreen = document.getElementById("videoScreen");
const mainContent = document.getElementById("mainContent");

const video1 = document.getElementById("video1");
const video2 = document.getElementById("video2");

/* START BUTTON */
startBtn.addEventListener("click", () => {

    startScreen.style.display = "none";
    videoScreen.style.display = "block";

    video1.play();

});

/* VIDEO 1 END → VIDEO 2 START */
video1.addEventListener("ended", () => {

    video1.style.display = "none";
    video2.style.display = "block";

    video2.play();

});

/* VIDEO 2 END → SHOW CONTENT */
video2.addEventListener("ended", () => {

    video2.pause();

    setTimeout(() => {

        videoScreen.style.display = "none";
        mainContent.style.display = "block";

        document.getElementById("surpriseBtn")
        .classList.add("show-btn");

    }, 1000);

});
</script>

</body>
</html>
